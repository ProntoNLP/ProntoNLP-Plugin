<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sector & Topic Analysis — Charts</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background: #0f1117; color: #e1e4e8; padding: 20px; }
    h1 { border-bottom: 2px solid #6AA64A; padding-bottom: 8px; color: #f0f0f0; }
    p { color: #9ca3af; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 1200px; }
    .chart-box { background: #1c1f26; border: 1px solid #2d3139; border-radius: 8px; padding: 16px; }
    .chart-box h3 { margin-top: 0; font-size: 14px; color: #6AA64A; }
    canvas { width: 100% !important; height: 320px !important; }
    @media print { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>Sector & Topic Analysis — Charts</h1>
  <p>Generated: [Date] | Topic: [Topic] | Period: [Date Range]</p>
  <div class="grid">
    <div class="chart-box"><h3>Sector Sentiment Ranking</h3><canvas id="c1"></canvas></div>
    <div class="chart-box"><h3>Sector Mention Volume</h3><canvas id="c2"></canvas></div>
    <div class="chart-box"><h3>Top Companies by Topic</h3><canvas id="c3"></canvas></div>
    <div class="chart-box"><h3>Event Type Distribution</h3><canvas id="c4"></canvas></div>
  </div>
  <script>
    Chart.defaults.color = '#9ca3af';
    Chart.defaults.borderColor = '#374151';

    // DATA — fill these arrays from Pronto tool results

    // From searchSectors
    const sectorNames = [/* e.g. 'Information Technology', 'Financials', 'Health Care', ... */];
    const sectorSentiments = [/* sentiment score per sector, range -1 to +1 */];
    const sectorMentions = [/* mention/hit count per sector */];

    // From searchTopCompanies
    const companyNames = [/* top companies discussing the topic */];
    const companySentiments = [/* sentiment score per company, range -1 to +1 */];

    // From getAnalytics eventTypes
    const eventTypeLabels = [/* event type names, e.g. 'RiskFactor', 'PositiveOutlook', ... */];
    const eventTypeCounts = [/* count per event type */];

    // Chart 1: Sector Sentiment Ranking (horizontal bar — green positive, red negative)
    new Chart(document.getElementById('c1'), {
      type: 'bar',
      data: {
        labels: sectorNames,
        datasets: [{
          label: 'Sentiment Score',
          data: sectorSentiments,
          backgroundColor: sectorSentiments.map(v => v >= 0 ? '#22c55e' : '#ef4444')
        }]
      },
      options: {
        indexAxis: 'y',
        scales: {
          x: { min: -1, max: 1, title: { display: true, text: 'Sentiment Score' } }
        }
      }
    });

    // Chart 2: Sector Mention Volume (horizontal bar)
    new Chart(document.getElementById('c2'), {
      type: 'bar',
      data: {
        labels: sectorNames,
        datasets: [{
          label: 'Mention Count',
          data: sectorMentions,
          backgroundColor: '#6AA64A'
        }]
      },
      options: {
        indexAxis: 'y',
        scales: {
          x: { title: { display: true, text: 'Mentions' } }
        }
      }
    });

    // Chart 3: Top Companies by Topic (horizontal bar — green/red by sentiment)
    new Chart(document.getElementById('c3'), {
      type: 'bar',
      data: {
        labels: companyNames,
        datasets: [{
          label: 'Sentiment Score',
          data: companySentiments,
          backgroundColor: companySentiments.map(v => v >= 0 ? '#22c55e' : '#ef4444')
        }]
      },
      options: {
        indexAxis: 'y',
        scales: {
          x: { min: -1, max: 1, title: { display: true, text: 'Sentiment Score' } }
        }
      }
    });

    // Chart 4: Event Type Distribution (horizontal bar)
    new Chart(document.getElementById('c4'), {
      type: 'bar',
      data: {
        labels: eventTypeLabels,
        datasets: [{
          label: 'Event Count',
          data: eventTypeCounts,
          backgroundColor: '#f97316'
        }]
      },
      options: {
        indexAxis: 'y',
        scales: {
          x: { title: { display: true, text: 'Count' } }
        }
      }
    });
  </script>
</body>
</html>
