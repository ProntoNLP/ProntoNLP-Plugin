<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Keyword & Topic Trends — Charts</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background: #0f1117; color: #e1e4e8; padding: 20px; }
    h1 { border-bottom: 2px solid #6AA64A; padding-bottom: 8px; color: #f0f0f0; }
    p { color: #9ca3af; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 1200px; }
    .chart-box { background: #1c1f26; border: 1px solid #2d3139; border-radius: 8px; padding: 16px; }
    .chart-box h3 { margin-top: 0; font-size: 14px; color: #6AA64A; }
    canvas { width: 100% !important; height: 320px !important; }
    @media print { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>Keyword & Topic Trends — Charts</h1>
  <p>Generated: [Date] | Scope: [Company / Sector] | Period: [Date Range]</p>
  <div class="grid">
    <div class="chart-box"><h3>Top Trends by Score</h3><canvas id="c1"></canvas></div>
    <div class="chart-box"><h3>% Change — Rising vs Declining</h3><canvas id="c2"></canvas></div>
    <div class="chart-box"><h3>Mention Volume (Hits)</h3><canvas id="c3"></canvas></div>
    <div class="chart-box"><h3>Term Frequency by Company</h3><canvas id="c4"></canvas></div>
  </div>
  <script>
    Chart.defaults.color = '#9ca3af';
    Chart.defaults.borderColor = '#374151';

    // DATA — fill these arrays from Pronto tool results

    // From getTrends (top 10 topics)
    const trendNames = [/* e.g. 'AI Integration', 'Supply Chain', 'Tariffs', ... */];
    const trendScores = [/* relevance score per topic */];
    const trendChanges = [/* % change vs prior period — positive = rising, negative = declining */];
    const trendHits = [/* document mention count per topic */];

    // From getTermHeatmap (for a single searched term)
    const heatmapCompanies = [/* company names */];
    const heatmapFrequencies = [/* mention frequency per company */];

    // Chart 1: Top Trends by Score (horizontal bar — green=rising, red=declining)
    new Chart(document.getElementById('c1'), {
      type: 'bar',
      data: {
        labels: trendNames,
        datasets: [{
          label: 'Trend Score',
          data: trendScores,
          backgroundColor: trendChanges.map(v => v >= 0 ? '#22c55e' : '#ef4444')
        }]
      },
      options: {
        indexAxis: 'y',
        scales: {
          x: { title: { display: true, text: 'Score' } }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              afterLabel: (ctx) => `Change: ${trendChanges[ctx.dataIndex] >= 0 ? '+' : ''}${trendChanges[ctx.dataIndex]}%`
            }
          }
        }
      }
    });

    // Chart 2: % Change per Topic (bar — positive=green, negative=red)
    new Chart(document.getElementById('c2'), {
      type: 'bar',
      data: {
        labels: trendNames,
        datasets: [{
          label: '% Change vs Prior Period',
          data: trendChanges,
          backgroundColor: trendChanges.map(v => v >= 0 ? '#22c55e' : '#ef4444')
        }]
      },
      options: {
        indexAxis: 'y',
        scales: {
          x: { title: { display: true, text: '% Change' } }
        }
      }
    });

    // Chart 3: Mention Volume / Hits per Topic (horizontal bar)
    new Chart(document.getElementById('c3'), {
      type: 'bar',
      data: {
        labels: trendNames,
        datasets: [{
          label: 'Hits (Mentions)',
          data: trendHits,
          backgroundColor: '#6AA64A'
        }]
      },
      options: {
        indexAxis: 'y',
        scales: {
          x: { title: { display: true, text: 'Mentions' } }
        }
      }
    });

    // Chart 4: Term Frequency by Company (from getTermHeatmap — vertical bar)
    new Chart(document.getElementById('c4'), {
      type: 'bar',
      data: {
        labels: heatmapCompanies,
        datasets: [{
          label: 'Term Frequency',
          data: heatmapFrequencies,
          backgroundColor: '#f97316'
        }]
      },
      options: {
        scales: {
          y: { title: { display: true, text: 'Frequency' } }
        }
      }
    });
  </script>
</body>
</html>
